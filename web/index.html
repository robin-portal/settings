<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin's Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header avec l'avatar centré en haut -->
        <header>
            <img src="ressources/avatar.png" alt="Robin's Avatar" class="logo">
            <h1>ROBIN'S SETTINGS</h1>
            <p class="subtitle">&lt;3</p>
        </header>

        <!-- Onglets centrés sous forme de boutons pour changer de jeu -->
        <nav class="game-tabs">
            <button class="tab-btn active" data-game="valorant">Valorant</button>
            <button class="tab-btn" data-game="rocket-league">Rocket League</button>
            <button class="tab-btn" data-game="minecraft">Minecraft</button>
        </nav>

        <!-- Sélecteur de comptes -->
        <div class="account-selector" id="account-selector">
            <span class="selector-label">Compte :</span>
            <button class="account-btn active" onclick="changeAccount('nathan')">Nathan</button>
            <button class="account-btn" onclick="changeAccount('robin')">Robin</button>
        </div>

        <!-- Section Code de Réticule (Crosshair) sur deux lignes -->
        <div class="crosshair-container" id="crosshair-section">
            <span class="crosshair-label">crosshair</span>
            <div class="crosshair-box" onclick="copyCrosshair()" title="Cliquer pour copier">
                <code id="crosshair-code">0;s;1;P;h;0;0l;4;0v;4;0o;0;0a;1;0f;0;1b;0;S;c;0;s;0.738;o;1</code>
            </div>
        </div>

        <!-- Le container central géant pour le prototype -->
        <main class="game-viewer-container">
            <div class="game-viewer" id="val-viewer">
                <!-- Image Valorant de fond (Nathan / 1.png par défaut) -->
                <img src="ressources/valorant/nathan/1.png" alt="Valorant Screen" id="val-screen" class="game-screen">

                <!-- Zones cliquables invisibles (Boutons officiels Valorant) -->
                <button class="click-zone" id="zone-1" style="left: 33.6%; top: 3.8%; width: 5%; height: 3.5%;" onclick="changeScreen(1)" title="Général (Haut)"></button>
                
                <button class="click-zone" id="zone-2-a" style="left: 40.2%; top: 3.5%; width: 5%; height: 3.5%;" onclick="changeScreen(2)" title="Contrôles (Haut)"></button>
                <button class="click-zone" id="zone-2-b" style="left: 39.3%; top: 9.1%; width: 5%; height: 3.5%;" onclick="changeScreen(2)" title="Contrôles (Sous-onglet)"></button>
                
                <button class="click-zone" id="zone-3" style="left: 44.9%; top: 9.2%; width: 5%; height: 3.5%;" onclick="changeScreen(3)" title="Raccourcis (Sous-onglet)"></button>
                <button class="click-zone" id="zone-5" style="left: 52.2%; top: 9.2%; width: 5%; height: 3.5%;" onclick="changeScreen(5)" title="Réticule (Sous-onglet)"></button>
                <button class="click-zone" id="zone-6" style="left: 59.9%; top: 9.2%; width: 5%; height: 3.5%;" onclick="changeScreen(6)" title="Vidéo (Sous-onglet)"></button>
                
                <button class="click-zone" id="zone-7" style="left: 53.4%; top: 3.8%; width: 5%; height: 3.5%;" onclick="changeScreen(7)" title="Audio (Haut)"></button>

                <!-- Zone 8 (Robin uniquement) : alignée sur la photo 3, décalée de 30px à droite (46.2%), plus large et haute -->
                <button class="click-zone" id="zone-8" style="left: 46.2%; top: 5.2%; width: 7%; height: 4.5%; display: none;" onclick="changeScreen(8)" title="Onglet 8"></button>

                <!-- Boutons de navigation "Scroll" pour l'image 3 et 4 -->
                <button class="scroll-btn scroll-down" id="btn-scroll-down" onclick="changeScreen(4)" title="Descendre">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
                <button class="scroll-btn scroll-up" id="btn-scroll-up" onclick="changeScreen(3)" title="Monter">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                </button>
            </div>
        </main>

        <footer>
            <h5>developed by robinscorp</h5>
        </footer>
    </div>

    <!-- Script de gestion de la navigation Valorant -->
    <script>
        let currentAccount = 'nathan'; 
        let currentImage = 1;
        const defaultCrosshair = "0;s;1;P;h;0;0l;4;0v;4;0o;0;0a;1;0f;0;1b;0;S;c;0;s;0.738;o;1";

        // Fonction pour changer d'écran (1 à 8)
        function changeScreen(screenNum) {
            currentImage = screenNum;
            const screenImg = document.getElementById('val-screen');
            
            screenImg.src = `ressources/valorant/${currentAccount}/${screenNum}.png`;

            const btnDown = document.getElementById('btn-scroll-down');
            const btnUp = document.getElementById('btn-scroll-up');

            if (screenNum === 3) {
                btnDown.classList.add('active');
                btnUp.classList.remove('active');
            } else if (screenNum === 4) {
                btnUp.classList.add('active');
                btnDown.classList.remove('active');
            } else {
                btnDown.classList.remove('active');
                btnUp.classList.remove('active');
            }
        }

        // Fonction pour changer de compte
        function changeAccount(accountName) {
            currentAccount = accountName;
            
            const buttons = document.querySelectorAll('.account-btn');
            buttons.forEach(btn => {
                if (btn.textContent.toLowerCase() === accountName) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Afficher ou masquer la zone 8 selon le compte actif
            const zone8 = document.getElementById('zone-8');
            if (accountName === 'robin') {
                zone8.style.display = 'block';
            } else {
                zone8.style.display = 'none';
                if (currentImage === 8) {
                    currentImage = 1;
                }
            }

            changeScreen(currentImage);
        }

        // Fonction de copie directe au clic sur la boîte
        function copyCrosshair() {
            const codeElement = document.getElementById('crosshair-code');
            const boxElement = document.querySelector('.crosshair-box');
            
            navigator.clipboard.writeText(defaultCrosshair).then(() => {
                boxElement.classList.add('copied');
                codeElement.textContent = "COPIÉ !";
                
                setTimeout(() => {
                    boxElement.classList.remove('copied');
                    codeElement.textContent = defaultCrosshair;
                }, 1000);
            }).catch(err => {
                console.error("Erreur de copie : ", err);
            });
        }

        window.onload = () => {
            changeScreen(1);
        };
    </script>
</body>
</html>
